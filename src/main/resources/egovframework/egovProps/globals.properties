#-----------------------------------------------------------------------
#
#   globals.properties : \uC2DC\uC2A4\uD15C 
#   
#-----------------------------------------------------------------------
#   1.  key = value \uAD6C\uC870\uC785\uB2C8\uB2E4.
#   2.  key\uAC12\uC740 \uACF5\uBC31\uBB38\uC790\uB97C \uD3EC\uD568\uBD88\uAC00, value\uAC12\uC740 \uACF5\uBC31\uBB38\uC790\uB97C \uAC00\uB2A5
#   3.  key\uAC12\uC73C\uB85C \uD55C\uAE00\uC744 \uC0AC\uC6A9\uBD88\uAC00,   value\uAC12\uC740 \uD55C\uAE00\uC0AC\uC6A9\uC774 \uAC00\uB2A5
#   4.  \uC904\uC744 \uBC14\uAFC0 \uD544\uC694\uAC00 \uC788\uC73C\uBA74 '\'\uB97C \uB77C\uC778\uC758 \uB05D\uC5D0 \uCD94\uAC00(\uB9CC\uC57D  '\'\uBB38\uC790\uB97C \uC0AC\uC6A9\uD574\uC57C \uD558\uB294 \uACBD\uC6B0\uB294 '\\'\uB97C \uC0AC\uC6A9)
#   5.  Windows\uC5D0\uC11C\uC758 \uB514\uB809\uD1A0\uB9AC \uD45C\uC2DC : '\\' or '/'  ('\' \uC0AC\uC6A9\uD558\uBA74 \uC548\uB428)
#   6.  Unix\uC5D0\uC11C\uC758 \uB514\uB809\uD1A0\uB9AC \uD45C\uC2DC : '/'
#   7.  \uC8FC\uC11D\uBB38 \uCC98\uB9AC\uB294  #\uC0AC\uC6A9
#   8.  value\uAC12 \uB4A4\uC5D0 \uC2A4\uD398\uC774\uC2A4\uAC00 \uC874\uC7AC\uD558\uB294 \uACBD\uC6B0 \uC11C\uBE14\uB9BF\uC5D0\uC11C \uCC38\uC870\uD560\uB54C\uB294 \uC5D0\uB7EC\uBC1C\uC0DD\uD560 \uC218 \uC788\uC73C\uBBC0\uB85C trim()\uD558\uAC70\uB098 \uB9C8\uC9C0\uB9C9 \uACF5\uBC31\uC5C6\uC774 properties \uAC12\uC744 \uC124\uC815\uD560\uAC83
#-----------------------------------------------------------------------
# \uAD6C\uBD84( LOCAL - \uB85C\uCEEC | DEV - \uAC1C\uBC1C\uC11C\uBC84 | OPS - \uC6B4\uC601\uC11C\uBC84 )
Globals.Mode = LOCAL

# \uC6B4\uC601\uC11C\uBC84 \uD0C0\uC785(WINDOWS, UNIX)
Globals.OsType = UNIX

# G4C \uC5F0\uACB0\uC6A9 IP (localhost)
Globals.LocalIp = 127.0.0.1

# DB\uC11C\uBC84 \uD0C0\uC785(mysql,oracle,altibase,tibero,postgres) - datasource \uBC0F sqlMap \uD30C\uC77C \uC9C0\uC815\uC5D0 \uC0AC\uC6A9\uB428
Globals.DbType=${Globals.${Globals.Mode}.DbType}
Globals.DriverClassName=${Globals.${Globals.Mode}.DriverClassName}
Globals.Url=${Globals.${Globals.Mode}.Url}
Globals.UserName=${Globals.${Globals.Mode}.UserName}
Globals.Password=${Globals.${Globals.Mode}.Password}

# postgres(LOCAL \uB85C\uCEEC\uC11C\uBC84)
Globals.LOCAL.DbType=postgres
Globals.LOCAL.DriverClassName=net.sf.log4jdbc.DriverSpy
Globals.LOCAL.Url=jdbc:log4jdbc:postgresql://192.168.0.203:5432/irispostgres
Globals.LOCAL.UserName=irisuser
Globals.LOCAL.Password=irisuser


# postgres(DEV \uAC1C\uBC1C\uC11C\uBC84)
Globals.DEV.DbType=postgres
Globals.DEV.DriverClassName=net.sf.log4jdbc.DriverSpy
Globals.DEV.Url=jdbc:log4jdbc:postgresql://192.168.0.203:5432/irispostgres
Globals.DEV.UserName=irisuser
Globals.DEV.Password=irisuser

# postgres(OPS \uC6B4\uC601\uC11C\uBC84)
Globals.OPS.DbType=postgres
Globals.OPS.DriverClassName=org.postgresql.Driver
Globals.OPS.Url=jdbc:postgresql://192.168.0.203:5432/irispostgres
Globals.OPS.UserName=irisuser
Globals.OPS.Password=irisuser


# MainPage Setting
Globals.MainPage = /cmm/main/mainPage.do

